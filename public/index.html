<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1"
    />
    <meta name="theme-color" content="#050a12" />
    <title>Save Japan!</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <div class="brand">
        <span class="brand-mark">日</span>
        <span id="networkName">全国防衛ネットワーク</span>
      </div>
      <section id="join">
        <div class="hero">
          <img
            class="mobile-key-art"
            src="/assets/save-japan-key-art.png"
            alt="UFO invasion over Japan"
          />
          <div id="alertLabel" class="eyebrow">UFO警報 · レベル5</div>
          <h1>SAVE<br /><span>JAPAN!</span></h1>
          <p id="heroCopy">
            あなたの故郷が、あなたを待っている。47都道府県の仲間と力を合わせ、日本を守ろう。
          </p>
        </div>
        <form id="joinForm" class="card">
          <label class="field"
            ><span id="nameLabel">名前</span
            ><input
              id="nickname"
              maxlength="16"
              required
              placeholder="ニックネーム"
              autocomplete="nickname" /></label
          ><label class="field"
            ><span id="hometownLabel">あなたの故郷は？</span
            ><select id="prefecture" required></select></label
          ><button id="joinButton" class="primary">迎撃機で参戦 →</button>
          <div id="joinFine" class="fine">
            登録不要。ダウンロード不要。必要なのはチームワークだけ。
          </div>
        </form>
      </section>
      <section id="game" class="hidden pilot">
        <div class="interceptor" id="ship">
          <img src="/assets/sprites/interceptor-yellow.png" alt="Interceptor" />
        </div>
        <div class="pilot-name" id="pilotName"></div>
        <div class="pilot-region" id="pilotRegion"></div>
        <div class="card mission-card">
          <div class="mission-number" id="missionNumber">待機中</div>
          <h2 id="missionTitle">作戦開始を待っています</h2>
          <p id="missionBrief">まもなく防衛司令部が作戦を開始します。</p>
          <div class="progress"><i id="progressBar"></i></div>
        </div>
        <button id="fire" class="fire hidden">DEFEND!</button>
        <div class="score">
          <span id="contributionLabel">あなたの貢献</span> <b id="myScore">0</b>
        </div>
      </section>
      <section id="victory" class="hidden victory">
        <img
          class="victory-art"
          src="/assets/save-japan-key-art.png"
          alt="Japan protected"
        />
        <h2>日本は<br />救われた・・</h2>
        <p>47都道府県、ひとつのチーム。<br />この元気を、現実の日本へ。</p>
        <div class="mobile-ranking">
          <h3 id="mobileRankingTitle">トップランキング</h3>
          <ol id="mobileLeaderboard"></ol>
        </div>
      </section>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/audio.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
